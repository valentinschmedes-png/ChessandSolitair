<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Spielhalle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ===================== HAUPTMENÜ ===================== -->
  <section id="screen-menu" class="screen active">
    <header class="app-header">
      <h1 class="app-title">Spiel<span>halle</span></h1>
      <p class="app-subtitle">Wähle ein Spiel</p>
    </header>

    <div class="tile-grid">
      <button class="tile" data-target="screen-chess-setup">
        <span class="tile-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C10.9 2 10 2.9 10 4c0 .7.35 1.3.88 1.68C10.3 6.2 9.8 7 9.5 8H8a1 1 0 0 0-1 1v1a1 1 0 0 0 1 1h.2l-.9 6.3a2 2 0 0 0 2 2.7h5.4a2 2 0 0 0 2-2.7L15.8 11H16a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-1.5c-.3-1-.8-1.8-1.38-2.32A2 2 0 0 0 14 4c0-1.1-.9-2-2-2Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <path d="M7 22h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="tile-label">Schach</span>
      </button>

      <button class="tile" data-target="screen-solitaire" id="tile-solitaire">
        <span class="tile-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="5" width="11" height="15" rx="1.6" stroke="currentColor" stroke-width="1.4"/>
            <path d="M9 9.5 7.2 13.5h3.6L9 9.5Z" fill="currentColor"/>
            <rect x="10" y="3" width="11" height="15" rx="1.6" stroke="currentColor" stroke-width="1.4" fill="var(--bg-elevated)"/>
            <path d="M15.5 7c1.4 0 2.3 1 2.3 2.2 0 1.6-2.3 2.4-2.3 4.1M15.5 15.6h.01" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="tile-label">Solitär</span>
      </button>

      <button class="tile tile-disabled" disabled>
        <span class="tile-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.4"/>
            <path d="M12 7v5l3.2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="tile-label">Bald verfügbar</span>
      </button>
    </div>
  </section>

  <!-- ===================== SCHACH: SETUP — GEGNER ===================== -->
  <section id="screen-chess-setup" class="screen">
    <header class="sub-header">
      <button class="btn-back" data-target="screen-menu" aria-label="Zurück">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 5 8 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h2>Schach</h2>
    </header>

    <div class="setup-body">
      <p class="setup-question">Gegen wen möchtest du spielen?</p>
      <div class="option-stack">
        <button class="option-card" data-opponent="human">
          <span class="option-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M3 20c0-3 2.2-5 5-5s5 2 5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="17" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M12.5 20c0-3 2.2-5 4.5-5s5 2 5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </span>
          <span class="option-text">
            <strong>Mensch gegen Mensch</strong>
            <small>Zwei Spieler an einem Gerät</small>
          </span>
        </button>
        <button class="option-card" data-opponent="bot">
          <span class="option-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="9" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M12 9V5m0 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" stroke="currentColor" stroke-width="1.4"/><circle cx="9" cy="14" r="1.2" fill="currentColor"/><circle cx="15" cy="14" r="1.2" fill="currentColor"/></svg>
          </span>
          <span class="option-text">
            <strong>Gegen den Computer</strong>
            <small>Drei Schwierigkeitsgrade</small>
          </span>
        </button>
      </div>
    </div>
  </section>

  <!-- ===================== SCHACH: SETUP — SCHWIERIGKEIT ===================== -->
  <section id="screen-chess-difficulty" class="screen">
    <header class="sub-header">
      <button class="btn-back" data-target="screen-chess-setup" aria-label="Zurück">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 5 8 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h2>Schwierigkeit</h2>
    </header>
    <div class="setup-body">
      <p class="setup-question">Wie stark soll der Computer spielen?</p>
      <div class="option-stack">
        <button class="option-card" data-difficulty="easy">
          <span class="option-icon difficulty-dot easy" aria-hidden="true"></span>
          <span class="option-text">
            <strong>Leicht</strong>
            <small>Macht oft Fehler — ideal zum Üben</small>
          </span>
        </button>
        <button class="option-card" data-difficulty="medium">
          <span class="option-icon difficulty-dot medium" aria-hidden="true"></span>
          <span class="option-text">
            <strong>Mittel</strong>
            <small>Spielt solide, aber nicht perfekt</small>
          </span>
        </button>
        <button class="option-card" data-difficulty="hard">
          <span class="option-icon difficulty-dot hard" aria-hidden="true"></span>
          <span class="option-text">
            <strong>Schwer</strong>
            <small>Denkt mehrere Züge voraus</small>
          </span>
        </button>
      </div>
    </div>
  </section>

  <!-- ===================== SCHACH: SETUP — BRETTFARBE ===================== -->
  <section id="screen-chess-board-color" class="screen">
    <header class="sub-header">
      <button class="btn-back" id="btn-back-from-color" aria-label="Zurück">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 5 8 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h2>Brettfarbe</h2>
    </header>
    <div class="setup-body">
      <p class="setup-question">Wähle die Farben des Schachbretts</p>
      <div class="option-stack">
        <button class="option-card board-preview-card" data-board-theme="blue">
          <span class="board-swatch">
            <span class="swatch-cell swatch-blue-dark"></span>
            <span class="swatch-cell swatch-blue-light"></span>
            <span class="swatch-cell swatch-blue-light"></span>
            <span class="swatch-cell swatch-blue-dark"></span>
          </span>
          <span class="option-text">
            <strong>Mittelblau &amp; Beige</strong>
            <small>Klassisch &amp; ruhig</small>
          </span>
        </button>
        <button class="option-card board-preview-card" data-board-theme="green">
          <span class="board-swatch">
            <span class="swatch-cell swatch-green-dark"></span>
            <span class="swatch-cell swatch-green-light"></span>
            <span class="swatch-cell swatch-green-light"></span>
            <span class="swatch-cell swatch-green-dark"></span>
          </span>
          <span class="option-text">
            <strong>Hellgrün &amp; Hellgelb</strong>
            <small>Frisch &amp; freundlich</small>
          </span>
        </button>
      </div>
    </div>
  </section>

  <!-- ===================== SCHACH: SPIEL ===================== -->
  <section id="screen-chess-game" class="screen">
    <header class="sub-header game-header">
      <button class="btn-back" id="btn-leave-chess" aria-label="Verlassen">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 5 8 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h2 id="chess-game-title">Schach</h2>
      <button class="btn-icon" id="btn-undo" aria-label="Zug zurücknehmen" title="Zug zurücknehmen">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 7 4 12l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 12h11a5 5 0 0 1 0 10h-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </header>

    <div class="chess-layout">
      <div class="turn-indicator" id="turn-indicator">Weiß ist am Zug</div>

      <div class="board-wrap">
        <div id="chess-board" class="chess-board"></div>
        <div id="promotion-overlay" class="promotion-overlay hidden">
          <div class="promotion-box">
            <p>Bauer umwandeln in:</p>
            <div class="promotion-choices" id="promotion-choices"></div>
          </div>
        </div>
        <div id="end-overlay" class="end-overlay hidden">
          <div class="end-box">
            <p id="end-message">Schachmatt!</p>
            <div class="end-actions">
              <button class="btn-primary" id="btn-rematch">Neues Spiel</button>
              <button class="btn-secondary" id="btn-end-to-menu">Zum Menü</button>
            </div>
          </div>
        </div>
      </div>

      <div class="captured-row">
        <div class="captured-set" id="captured-white"></div>
        <div class="captured-set" id="captured-black"></div>
      </div>

      <div class="move-history-panel">
        <h3>Zugliste</h3>
        <ol id="move-list" class="move-list"></ol>
      </div>
    </div>
  </section>

  <!-- ===================== SOLITÄR ===================== -->
  <section id="screen-solitaire" class="screen">
    <header class="sub-header game-header">
      <button class="btn-back" data-target="screen-menu" aria-label="Zurück">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 5 8 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h2>Solitär</h2>
      <button class="btn-icon" id="btn-new-solitaire" aria-label="Neues Spiel" title="Neues Spiel">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 4v6h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.6 14a8 8 0 1 0 2-8.5L4 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </header>

    <div class="solitaire-layout">
      <div class="solitaire-top">
        <div class="pile-group">
          <div class="pile" id="pile-stock"><div class="pile-placeholder">↺</div></div>
          <div class="pile" id="pile-waste"></div>
        </div>
        <div class="pile-group foundations" id="foundations"></div>
      </div>
      <div class="tableau" id="tableau"></div>
    </div>

    <div id="solitaire-win-overlay" class="end-overlay hidden">
      <div class="end-box">
        <p>🎉 Gewonnen!</p>
        <div class="end-actions">
          <button class="btn-primary" id="btn-solitaire-again">Neues Spiel</button>
          <button class="btn-secondary" data-target="screen-menu">Zum Menü</button>
        </div>
      </div>
    </div>
  </section>

</div>

<script src="chess.js"></script>
<script src="solitaire.js"></script>
<script src="app.js"></script>
</body>
</html>
